<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock display-5" style="color: var(--primary)"></i>
          <h3 class="mt-2 fw-bold">Restablecer contraseña</h3>
        </div>

        <form (ngSubmit)="onSubmit()" #form="ngForm">
          <div class="mb-3">
            <label for="password" class="form-label fw-medium">Nueva contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                id="password"
                type="password"
                class="form-control"
                [(ngModel)]="password"
                name="password"
                minlength="8"
                required
                placeholder="Mínimo 8 caracteres"
              />
            </div>
          </div>

          <div class="mb-4">
            <label for="confirmPassword" class="form-label fw-medium">Confirmar contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input
                id="confirmPassword"
                type="password"
                class="form-control"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                required
                placeholder="Repetí tu contraseña"
                #confirm="ngModel"
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100" [disabled]="loading() || password.length < 8 || !confirmPassword">
            Restablecer contraseña
          </button>
        </form>

        <p class="mt-4 text-center text-muted mb-0">
          ¿Ya recordás tu contraseña? <a routerLink="/login">Iniciá sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
