<section class="verify-pending">
  <div class="panel">
    <h1>Revisá tu email</h1>

    <p>Te enviamos un link de verificación.</p>
    <p>Cuando verifiques tu cuenta, vas a poder iniciar sesión.</p>

    <button type="button" (click)="resendEmail()" [disabled]="loading()">
      @if (loading()) {
        Reenviando...
      } @else {
        Reenviar email
      }
    </button>

    <a routerLink="/login">Ir al login</a>
  </div>
</section>
